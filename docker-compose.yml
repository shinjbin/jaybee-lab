services:
  frontend:
    build:
      context: ./frontend
    container_name: jaybee-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      app-network:
        aliases:
          - frontend
          - jaybee-frontend

  postgres:
    image: postgres:16-alpine
    container_name: jaybee-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-news_digest}
      - POSTGRES_USER=${POSTGRES_USER:-news_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-news_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      app-network:
        aliases:
          - postgres
          - jaybee-postgres

  backend:
    build:
      context: ./backend
    container_name: jaybee-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-news_user}:${POSTGRES_PASSWORD:-news_password}@postgres:5432/${POSTGRES_DB:-news_digest}
      - NEWS_POLL_INTERVAL_MINUTES=${NEWS_POLL_INTERVAL_MINUTES:-120}
      - NEWS_SUMMARY_BATCH_SIZE=${NEWS_SUMMARY_BATCH_SIZE:-10}
      - BRIEFING_WINDOW_HOURS=${BRIEFING_WINDOW_HOURS:-48}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - GNEWS_BASE_URL=${GNEWS_BASE_URL:-https://gnews.io/api/v4}
      - GNEWS_ENDPOINT=${GNEWS_ENDPOINT:-search}
      - GNEWS_QUERY=${GNEWS_QUERY:-stock market OR finance OR investing OR earnings OR inflation OR federal reserve}
      - GNEWS_TOPIC=${GNEWS_TOPIC:-business}
      - GNEWS_LANGUAGE=${GNEWS_LANGUAGE:-en}
      - GNEWS_COUNTRY=${GNEWS_COUNTRY:-us}
      - GNEWS_MAX=${GNEWS_MAX:-10}
      - GNEWS_CATEGORY=${GNEWS_CATEGORY:-market}
      - KIS_INDEX_MARKET_DIVISION_CODE=${KIS_INDEX_MARKET_DIVISION_CODE:-U}
      - KIS_INDEX_CODE=${KIS_INDEX_CODE:-0001}
      - KIS_INDEX_PERIOD_CODE=${KIS_INDEX_PERIOD_CODE:-D}
      - KIS_INDEX_HISTORY_DAYS=${KIS_INDEX_HISTORY_DAYS:-30}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:-}
      - TWELVE_DATA_BASE_URL=${TWELVE_DATA_BASE_URL:-https://api.twelvedata.com}
      - TWELVE_DATA_HISTORY_DAYS=${TWELVE_DATA_HISTORY_DAYS:-30}
      - TWELVE_DATA_SERIES=${TWELVE_DATA_SERIES:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_ENV=${KIS_ENV:-real}
      - KIS_BASE_URL=${KIS_BASE_URL:-}
      - KIS_MARKET_FLOW_ENABLED=${KIS_MARKET_FLOW_ENABLED:-true}
      - KIS_MARKET_CODE=${KIS_MARKET_CODE:-0001}
      - KIS_FLOW_TOP_COUNT=${KIS_FLOW_TOP_COUNT:-10}
      - KIS_FLOW_UNIVERSE_COUNT=${KIS_FLOW_UNIVERSE_COUNT:-}
      - KRX_AUTH_KEY=${KRX_AUTH_KEY:-}
      - KRX_OPEN_API_BASE_URL=${KRX_OPEN_API_BASE_URL:-https://data-dbg.krx.co.kr}
      - KRX_KOSPI_STOCKS_PATH=${KRX_KOSPI_STOCKS_PATH:-/svc/apis/sto/stk_bydd_trd}
    expose:
      - "3000"
    networks:
      app-network:
        aliases:
          - backend
          - jaybee-backend

  worker:
    build:
      context: ./backend
    container_name: jaybee-news-worker
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["npm", "run", "worker"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-news_user}:${POSTGRES_PASSWORD:-news_password}@postgres:5432/${POSTGRES_DB:-news_digest}
      - NEWS_POLL_INTERVAL_MINUTES=${NEWS_POLL_INTERVAL_MINUTES:-120}
      - NEWS_SUMMARY_BATCH_SIZE=${NEWS_SUMMARY_BATCH_SIZE:-10}
      - BRIEFING_WINDOW_HOURS=${BRIEFING_WINDOW_HOURS:-48}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - GNEWS_BASE_URL=${GNEWS_BASE_URL:-https://gnews.io/api/v4}
      - GNEWS_ENDPOINT=${GNEWS_ENDPOINT:-search}
      - GNEWS_QUERY=${GNEWS_QUERY:-stock market OR finance OR investing OR earnings OR inflation OR federal reserve}
      - GNEWS_TOPIC=${GNEWS_TOPIC:-business}
      - GNEWS_LANGUAGE=${GNEWS_LANGUAGE:-en}
      - GNEWS_COUNTRY=${GNEWS_COUNTRY:-us}
      - GNEWS_MAX=${GNEWS_MAX:-10}
      - GNEWS_CATEGORY=${GNEWS_CATEGORY:-market}
      - KIS_INDEX_MARKET_DIVISION_CODE=${KIS_INDEX_MARKET_DIVISION_CODE:-U}
      - KIS_INDEX_CODE=${KIS_INDEX_CODE:-0001}
      - KIS_INDEX_PERIOD_CODE=${KIS_INDEX_PERIOD_CODE:-D}
      - KIS_INDEX_HISTORY_DAYS=${KIS_INDEX_HISTORY_DAYS:-30}
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY:-}
      - TWELVE_DATA_BASE_URL=${TWELVE_DATA_BASE_URL:-https://api.twelvedata.com}
      - TWELVE_DATA_HISTORY_DAYS=${TWELVE_DATA_HISTORY_DAYS:-30}
      - TWELVE_DATA_SERIES=${TWELVE_DATA_SERIES:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_ENV=${KIS_ENV:-real}
      - KIS_BASE_URL=${KIS_BASE_URL:-}
      - KIS_MARKET_FLOW_ENABLED=${KIS_MARKET_FLOW_ENABLED:-true}
      - KIS_MARKET_CODE=${KIS_MARKET_CODE:-0001}
      - KIS_FLOW_TOP_COUNT=${KIS_FLOW_TOP_COUNT:-10}
      - KIS_FLOW_UNIVERSE_COUNT=${KIS_FLOW_UNIVERSE_COUNT:-}
      - KRX_AUTH_KEY=${KRX_AUTH_KEY:-}
      - KRX_OPEN_API_BASE_URL=${KRX_OPEN_API_BASE_URL:-https://data-dbg.krx.co.kr}
      - KRX_KOSPI_STOCKS_PATH=${KRX_KOSPI_STOCKS_PATH:-/svc/apis/sto/stk_bydd_trd}
    networks:
      app-network:
        aliases:
          - worker
          - jaybee-news-worker

  nginx:
    image: nginx:stable-alpine
    container_name: jaybee-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      app-network:
        aliases:
          - nginx
          - jaybee-nginx

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      app-network:
        aliases:
          - cloudflared

volumes:
  postgres-data:

networks:
  app-network:
    name: jaybee-network


