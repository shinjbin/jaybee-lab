services:
  frontend:
    build:
      context: ./frontend
    container_name: jaybee-frontend
    restart: unless-stopped
    expose:
      - "80"

  backend:
    build:
      context: ./backend
    container_name: jaybee-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"

  nginx:
    image: nginx:stable-alpine
    container_name: jaybee-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
