apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../optional

images:
  - name: jaybee-lab/frontend
    newName: ghcr.io/shinjbin/jaybee-lab-frontend
    newTag: main
  - name: jaybee-lab/backend
    newName: ghcr.io/shinjbin/jaybee-lab-backend
    newTag: main
  - name: jaybee-lab/bitcoin-trader
    newName: ghcr.io/shinjbin/jaybee-lab-bitcoin-trader
    newTag: main

patches:
  - path: postgres-patch.yaml
