apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoin-trader
  namespace: jaybee-lab
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: bitcoin-trader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bitcoin-trader
    spec:
      containers:
        - name: bitcoin-trader
          image: jaybee-lab/bitcoin-trader:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: jaybee-config
            - secretRef:
                name: jaybee-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
