apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: jaybee-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      containers:
        - name: worker
          image: jaybee-lab/backend:local
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - worker
          envFrom:
            - configMapRef:
                name: jaybee-config
            - secretRef:
                name: jaybee-secret
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: jaybee-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jaybee-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: jaybee-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
