name: Build and publish

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - backend/**
      - bitcoin-trader/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: production-images
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: sha-${{ github.sha }}
  FRONTEND_IMAGE: ghcr.io/shinjbin/jaybee-lab-frontend
  BACKEND_IMAGE: ghcr.io/shinjbin/jaybee-lab-backend
  BITCOIN_TRADER_IMAGE: ghcr.io/shinjbin/jaybee-lab-bitcoin-trader
  KUSTOMIZE_VERSION: v5.8.1

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Test backend
        working-directory: backend
        run: |
          npm ci
          npm run test:unit

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push bitcoin-trader image
        uses: docker/build-push-action@v7
        with:
          context: ./bitcoin-trader
          push: true
          tags: ${{ env.BITCOIN_TRADER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=bitcoin-trader
          cache-to: type=gha,mode=max,scope=bitcoin-trader

      - name: Install Kustomize
        run: |
          curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/kustomize.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo install /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Update production image tags
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            "jaybee-lab/frontend=${FRONTEND_IMAGE}:${IMAGE_TAG}" \
            "jaybee-lab/backend=${BACKEND_IMAGE}:${IMAGE_TAG}" \
            "jaybee-lab/bitcoin-trader=${BITCOIN_TRADER_IMAGE}:${IMAGE_TAG}"

      - name: Commit production image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml

          if git diff --cached --quiet; then
            echo "Production image tags are already up to date."
            exit 0
          fi

          SOURCE_COMMIT_MESSAGE="$(git log -1 --format=%s "$GITHUB_SHA")"
          CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" | paste -sd, -)"

          git commit \
            -m "chore: deploy ${IMAGE_TAG}" \
            -m "Source: ${SOURCE_COMMIT_MESSAGE}" \
            -m "Changed files: ${CHANGED_FILES}"
          git push origin HEAD:main
